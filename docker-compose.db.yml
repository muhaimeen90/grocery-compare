version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grocery-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grocery_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grocery_password}
      POSTGRES_DB: ${POSTGRES_DB:-grocery_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grocery_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
